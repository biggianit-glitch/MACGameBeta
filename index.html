<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>My Amneal Career Quest</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <style>
    html, body { margin:0; padding:0; background:#071421; overflow:hidden; }
    body { display:flex; justify-content:center; align-items:center; height:100vh; }
    canvas { display:block; image-rendering: pixelated; border: 3px solid #2f80bd; }
    #errorBox {
      display:none; position:fixed; left:20px; top:20px; max-width:850px;
      background:#7a1111; color:white; font-family:Consolas,monospace;
      padding:14px; z-index:9999; border:2px solid white; white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div id="errorBox"></div>
  <script>
    window.addEventListener("error", function(e) {
      const box = document.getElementById("errorBox");
      box.style.display = "block";
      box.textContent = "JavaScript error:\n" + e.message + "\nFile: " + e.filename + "\nLine: " + e.lineno + ":" + e.colno;
    });
  </script>
  <script src="./game.js?v=32"></script>
</body>
</html>
